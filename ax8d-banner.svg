<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#120000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan line animation -->
    <linearGradient id="scan">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#ff2a2a" opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1400" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#220000" stroke-width="1">
    <path d="M0 80 H1400"/>
    <path d="M0 160 H1400"/>
    <path d="M0 240 H1400"/>
    <path d="M0 320 H1400"/>
    <path d="M200 0 V400"/>
    <path d="M400 0 V400"/>
    <path d="M600 0 V400"/>
    <path d="M800 0 V400"/>
    <path d="M1000 0 V400"/>
    <path d="M1200 0 V400"/>
  </g>

  <!-- Scan line animation -->
  <rect width="1400" height="40" fill="url(#scan)">
    <animate attributeName="y" from="-50" to="450" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Particles -->
  <g fill="#ff2a2a" opacity="0.6">
    <circle cx="200" cy="120" r="2">
      <animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="200" r="2">
      <animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="140" r="2">
      <animate attributeName="cy" values="140;120;140" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main text -->
  <text x="50%" y="45%" text-anchor="middle"
        font-size="90" fill="#ff2a2a"
        font-family="monospace"
        filter="url(#glow)">
    AX8D
  </text>

  <!-- Subtitle -->
  <text x="50%" y="60%" text-anchor="middle"
        font-size="28" fill="#ffffff"
        font-family="monospace"
        opacity="0.8">
    OFFENSIVE SECURITY OPERATIONS
  </text>

  <!-- Pulsing underline -->
  <rect x="450" y="250" width="500" height="2" fill="#ff2a2a">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </rect>

</svg>
